name: release-client

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_ZIGBUILD_VERSION: '0.20.1'
  ZIG_VERSION: '0.13.0'

jobs:
  verify:
    name: Verify release gate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: bash scripts/verify-release-version.sh "${GITHUB_REF_NAME}"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Run clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    name: Build client (${{ matrix.label }})
    needs: verify
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary_name: baidupan-cli
            archive_ext: tar.gz
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-gnu
            binary_name: baidupan-cli.exe
            archive_ext: zip
          - os: ubuntu-latest
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            binary_name: baidupan-cli
            archive_ext: tar.gz
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
            binary_name: baidupan-cli
            archive_ext: tar.gz
          - os: macos-14
            label: macos-aarch64
            target: aarch64-apple-darwin
            binary_name: baidupan-cli
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Zig for cross builds
        if: runner.os == 'Linux' || runner.os == 'Windows'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache cargo-zigbuild
        if: runner.os == 'Linux' || runner.os == 'Windows'
        uses: actions/cache@v4
        id: zigbuild-cache
        with:
          path: |
            ~/.cargo/bin/cargo-zigbuild
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-zigbuild-${{ env.CARGO_ZIGBUILD_VERSION }}-${{ runner.os }}

      - name: Install cargo-zigbuild for cross builds
        if: (runner.os == 'Linux' || runner.os == 'Windows') && steps.zigbuild-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild --locked --version ${{ env.CARGO_ZIGBUILD_VERSION }}

      - name: Build client binary (native)
        if: runner.os == 'macOS'
        env:
          BAIDUPAN_DEFAULT_APP_NAME: ${{ secrets.BAIDUPAN_APP_NAME }}
          BAIDUPAN_DEFAULT_CRYPTO_PASSPHRASE: ${{ secrets.BAIDUPAN_CRYPTO_PASSPHRASE }}
        run: cargo build --locked --release --bin baidupan-cli --target ${{ matrix.target }}

      - name: Build client binary (cross)
        if: runner.os == 'Linux' || runner.os == 'Windows'
        env:
          BAIDUPAN_DEFAULT_APP_NAME: ${{ secrets.BAIDUPAN_APP_NAME }}
          BAIDUPAN_DEFAULT_CRYPTO_PASSPHRASE: ${{ secrets.BAIDUPAN_CRYPTO_PASSPHRASE }}
        run: cargo zigbuild --locked --release --bin baidupan-cli --target ${{ matrix.target }}

      - name: Package client archive (Unix)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          asset="baidupan-cli-${GITHUB_REF_NAME}-${{ matrix.label }}.${{ matrix.archive_ext }}"
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" "${{ matrix.binary_name }}"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Package client archive (Windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          $asset = "baidupan-cli-$env:GITHUB_REF_NAME-${{ matrix.label }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" -DestinationPath $asset
          "asset=$asset" >> $env:GITHUB_OUTPUT

      - name: Upload packaged artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.label }}
          path: ${{ steps.package_unix.outputs.asset }}

      - name: Upload packaged artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.label }}
          path: ${{ steps.package_windows.outputs.asset }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's|\./||' \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
